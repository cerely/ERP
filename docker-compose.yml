services:
  erp-dev:
    image: node:20-alpine
    container_name: vyom-erp-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true

  erp-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyom-erp-prod
    ports:
      - "3001:80"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    image: node:20-alpine
    container_name: vyom-erp-backend
    working_dir: /app
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    command: sh -c "npm install && node index.js"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_NAME=erp_db
      - DB_PORT=5432
      - JWT_SECRET=supersecret
    depends_on:
      - db

  db:
    image: postgres:alpine
    container_name: vyom-erp-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=erp_db
    volumes:
      - pgdata:/var/lib/postgresql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"

volumes:
  pgdata:
